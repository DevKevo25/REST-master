<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>API Tester</title>

<!-- ── PWA Meta ── -->
<meta name="screen-orientation" content="portrait"/>
<meta name="theme-color" content="#141820"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="APITester"/>
<meta name="description" content="Offline REST API testing tool"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>

<!-- ── Fonts (cached by SW after first load) ── -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0e14;
  --surface: #141820;
  --surface2: #1c2130;
  --border: #252d3d;
  --border2: #2e3a52;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.08);
  --accent-glow: rgba(0,229,160,0.2);
  --text: #e8edf5;
  --text-dim: #7a8ba8;
  --text-muted: #4a5568;
  --red: #ff4d6a;
  --yellow: #f5c842;
  --green: #00e5a0;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --sans: 'Syne', system-ui, sans-serif;
  --bottom-nav-h: 56px;
}

html { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  /* Safe area for notched phones */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ════════ HEADER ════════ */
header {
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}

.logo {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--accent);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent);
  flex-shrink: 0;
}

/* offline pill */
.offline-pill {
  display: none;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--yellow);
  background: rgba(245,200,66,0.1);
  border: 1px solid rgba(245,200,66,0.3);
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}
.offline-pill.show { display: flex; }
.offline-dot { width: 5px; height: 5px; background: var(--yellow); border-radius: 50%; }

/* install prompt */
.install-btn {
  display: none;
  background: var(--accent-dim);
  border: 1px solid rgba(0,229,160,0.3);
  color: var(--accent);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.install-btn.show { display: block; }
.install-btn:hover { background: var(--accent); color: #000; }

/* ════════ URL ROW ════════ */
.url-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.method-select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 8px 8px;
  border-radius: 6px;
  cursor: pointer;
  outline: none;
  flex-shrink: 0;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
  min-width: 68px;
  text-align: center;
}
.method-select:focus { border-color: var(--accent); }

.url-input {
  flex: 1;
  min-width: 0;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
.url-input::placeholder { color: var(--text-muted); }

.send-btn {
  background: var(--accent);
  color: #000;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  letter-spacing: 0.3px;
}
.send-btn:hover { background: #00ffb3; box-shadow: 0 0 14px var(--accent-glow); }
.send-btn:active { transform: scale(0.96); }
.send-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

.history-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.history-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ════════ LOADING BAR ════════ */
.loading-bar {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  background-size: 200% 100%;
  animation: shimmer 1s linear infinite;
  display: none;
  flex-shrink: 0;
}
.loading-bar.active { display: block; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ════════ MAIN ════════ */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

.request-panel, .response-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.request-panel { width: 50%; min-width: 240px; border-right: 1px solid var(--border); }
.response-panel { flex: 1; }

.splitter {
  width: 4px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.2s;
}
.splitter:hover, .splitter.dragging { background: var(--accent); }

/* ════════ TABS ════════ */
.tab-bar {
  display: flex;
  align-items: center;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 10px;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  padding: 11px 11px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ════════ PANEL CONTENT ════════ */
.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: none;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}
.panel-content.active { display: flex; }

/* ════════ KV ROWS ════════ */
.kv-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 6px;
  align-items: center;
}
.kv-input {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 5px;
  outline: none;
  width: 100%;
  min-width: 0;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.kv-input:focus { border-color: var(--accent); }
.kv-input::placeholder { color: var(--text-muted); }

.kv-delete {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 5px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1;
  transition: border-color 0.2s, color 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.kv-delete:hover, .kv-delete:active { border-color: var(--red); color: var(--red); }

.add-row-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: transparent;
  border: 1px dashed var(--border2);
  color: var(--text-dim);
  font-family: var(--sans);
  font-size: 12px; font-weight: 600;
  padding: 9px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  width: 100%;
  -webkit-tap-highlight-color: transparent;
}
.add-row-btn:hover, .add-row-btn:active { border-color: var(--accent); color: var(--accent); }

/* ════════ BODY EDITOR ════════ */
.body-type-row { display: flex; gap: 6px; flex-wrap: wrap; }
.body-type-btn {
  font-family: var(--mono);
  font-size: 11px; font-weight: 600;
  padding: 6px 12px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.body-type-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.body-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px; line-height: 1.7;
  padding: 12px;
  border-radius: 6px;
  outline: none;
  resize: vertical;
  min-height: 160px;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.body-textarea:focus { border-color: var(--accent); }
.body-textarea::placeholder { color: var(--text-muted); }

/* ════════ AUTH ════════ */
.auth-type-select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 5px;
  outline: none;
  width: 100%;
  cursor: pointer;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.auth-type-select:focus { border-color: var(--accent); }
.label { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
.field-group { display: flex; flex-direction: column; gap: 4px; }

/* ════════ RESPONSE ════════ */
.response-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-muted); gap: 12px; padding: 40px 20px; text-align: center;
}
.response-empty-icon { font-size: 36px; opacity: 0.4; }
.response-empty p { font-size: 13px; line-height: 1.6; max-width: 220px; }

.response-meta {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
.status-badge {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  padding: 3px 9px; border-radius: 4px; letter-spacing: 0.5px; white-space: nowrap;
}
.status-2xx { background: rgba(0,229,160,0.12); color: var(--green); }
.status-3xx { background: rgba(245,200,66,0.12); color: var(--yellow); }
.status-4xx, .status-5xx, .status-err { background: rgba(255,77,106,0.12); color: var(--red); }
.meta-item { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.meta-item span { color: var(--text); }
.copy-btn {
  margin-left: auto;
  background: transparent; border: 1px solid var(--border2); color: var(--text-dim);
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 5px; cursor: pointer;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }

.response-body-wrapper { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.response-code {
  flex: 1; overflow-y: auto; padding: 14px;
  font-family: var(--mono); font-size: 12px; line-height: 1.8;
  white-space: pre-wrap; word-break: break-all; color: var(--text);
  -webkit-overflow-scrolling: touch;
}
.json-key { color: #7dd3fc; }
.json-string { color: #a3e635; }
.json-number { color: #fb923c; }
.json-bool { color: #c084fc; }
.json-null { color: var(--text-dim); }

.response-headers-list {
  padding: 12px; display: flex; flex-direction: column; gap: 5px;
  overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch;
}
.header-row {
  display: flex; gap: 10px; font-family: var(--mono); font-size: 11px;
  padding: 7px 10px; background: var(--surface2); border-radius: 5px;
  flex-wrap: wrap; align-items: baseline;
}
.header-key { color: #7dd3fc; font-weight: 600; flex-shrink: 0; min-width: 110px; word-break: break-all; }
.header-val { color: var(--text); word-break: break-all; flex: 1; }

/* ════════ BOTTOM NAV ════════ */
.bottom-nav {
  display: none;
  height: var(--bottom-nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.bottom-nav-inner { display: flex; height: 100%; }
.bottom-nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; background: transparent; border: none; color: var(--text-dim);
  font-family: var(--sans); font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color 0.2s;
  text-transform: uppercase; position: relative;
}
.bottom-nav-btn.active { color: var(--accent); }
.bottom-nav-btn.active::after {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px; background: var(--accent); border-radius: 0 0 2px 2px;
}
.nav-icon { font-size: 18px; line-height: 1; }

/* ════════ METHOD COLORS ════════ */
.method-GET    { color: #00e5a0 !important; }
.method-POST   { color: #4da6ff !important; }
.method-PUT    { color: #f5c842 !important; }
.method-PATCH  { color: #ff8c42 !important; }
.method-DELETE { color: #ff4d6a !important; }
.method-HEAD   { color: #b57aff !important; }
.method-OPTIONS{ color: #7a8ba8 !important; }

/* ════════ TOAST ════════ */
.toast {
  position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%) translateY(30px);
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  padding: 10px 18px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 9999; opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items: center; gap: 8px; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

/* ════════ MODAL ════════ */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 100; backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
.overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px 16px 0 0; width: 100%; max-height: 80vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
  animation: slideUp 0.25s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close {
  background: transparent; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; padding: 4px; line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.modal-body {
  overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px;
  -webkit-overflow-scrolling: touch;
}
.history-item {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: border-color 0.15s;
  -webkit-tap-highlight-color: transparent; min-height: 48px;
}
.history-item:active { border-color: var(--accent); }
.history-url {
  flex: 1; font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
}
.history-status { font-family: var(--mono); font-size: 11px; font-weight: 700; flex-shrink: 0; }
.hist-2xx { color: var(--green); }
.hist-4xx, .hist-5xx, .hist-err { color: var(--red); }
.method-tag {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 3px; background: var(--surface); flex-shrink: 0;
}
.empty-history { text-align: center; color: var(--text-muted); font-size: 13px; padding: 40px 20px; }

/* ════════ RESPONSIVE ════════ */
@media (max-width: 768px) {
  header { height: 48px; padding: 0 12px; }
  .logo-text { display: none; }
  .url-row { padding: 7px 10px; gap: 5px; }
  .method-select { font-size: 10px; min-width: 60px; padding: 8px 6px; }
  .send-btn { padding: 8px 12px; font-size: 11px; }
  .history-btn { padding: 7px 8px; font-size: 11px; }
  .main { position: relative; overflow: hidden; }
  .splitter { display: none; }
  .request-panel, .response-panel {
    position: absolute; inset: 0; width: 100% !important; border-right: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .panel-hidden { opacity: 0; pointer-events: none; transform: translateX(16px); }
  .bottom-nav { display: flex; }
  .tab { padding: 12px 10px; }
  .kv-input { padding: 10px; font-size: 13px; }
  .kv-delete { width: 36px; height: 36px; font-size: 18px; }
  .body-textarea { font-size: 13px; }
  .response-code { font-size: 11px; }
  .add-row-btn { padding: 11px; }
}

@media (max-width: 420px) {
  header { padding: 0 10px; }
  .logo { font-size: 13px; }
  .url-row { gap: 4px; padding: 6px 8px; }
  .method-select { min-width: 56px; font-size: 9px; }
  .send-btn { padding: 8px 10px; }
  .history-btn { padding: 7px 7px; font-size: 10px; }
  .panel-content { padding: 10px; }
  .tab { padding: 11px 8px; font-size: 11px; }
  .kv-row { grid-template-columns: 1fr 1fr 34px; gap: 4px; }
}

@media (min-width: 1200px) {
  header { padding: 0 24px; }
  .url-row { padding: 8px 20px; }
  .panel-content { padding: 18px; }
  .kv-input { font-size: 13px; }
  .body-textarea { font-size: 13px; min-height: 220px; }
  .response-code { font-size: 13px; }
  .tab { font-size: 13px; padding: 12px 14px; }
}

.social-icon {
  color: var(--text-muted);
  display: flex;
  align-items: center;
  text-decoration: none;
  flex-shrink: 0;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
  padding: 4px;
}
.social-icon:hover { color: var(--accent); }
.social-icon.yt:hover { color: #ff0000; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">APITESTER</span>
  </div>

  <!-- Social icons -->
  <a href="https://github.com/DevKevo25" target="_blank" rel="noopener" class="social-icon" title="GitHub">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/>
    </svg>
  </a>

  <a href="https://youtube.com/@kevoloves?si=oCFmYYOIxaCaucAF" target="_blank" rel="noopener" class="social-icon" title="YouTube">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
    </svg>
  </a>

  <button class="install-btn" id="installBtn" onclick="installApp()">⬇ Install App</button>
  <button class="history-btn" onclick="showHistory()">⏱ History</button>
</header>

<!-- URL Row -->
<div class="url-row">
  <select class="method-select" id="methodSelect">
    <option>GET</option><option>POST</option><option>PUT</option>
    <option>PATCH</option><option>DELETE</option><option>HEAD</option><option>OPTIONS</option>
  </select>
  <input class="url-input" id="urlInput" type="url" inputmode="url"
    placeholder="https://api.example.com/v1/resource" autocomplete="off" spellcheck="false"/>
  <button class="send-btn" id="sendBtn" onclick="sendRequest()">SEND</button>
</div>

<div class="loading-bar" id="loadingBar"></div>

<!-- Main -->
<div class="main" id="mainArea">

  <!-- Request Panel -->
  <div class="request-panel" id="requestPanel">
    <div class="tab-bar">
      <div class="tab active" onclick="reqTab(this,'params')">Params</div>
      <div class="tab" onclick="reqTab(this,'headers')">Headers</div>
      <div class="tab" onclick="reqTab(this,'auth')">Auth</div>
      <div class="tab" onclick="reqTab(this,'body')">Body</div>
    </div>
    <div class="panel-content active" id="req-params">
      <div id="paramRows"></div>
      <button class="add-row-btn" onclick="addRow('param')">+ Add Parameter</button>
    </div>
    <div class="panel-content" id="req-headers">
      <div id="headerRows"></div>
      <button class="add-row-btn" onclick="addRow('header')">+ Add Header</button>
    </div>
    <div class="panel-content" id="req-auth">
      <div class="field-group">
        <div class="label">Auth Type</div>
        <select class="auth-type-select" id="authType" onchange="renderAuthFields()">
          <option value="none">None</option>
          <option value="bearer">Bearer Token</option>
          <option value="basic">Basic Auth</option>
          <option value="apikey">API Key</option>
        </select>
      </div>
      <div id="authFields"></div>
    </div>
    <div class="panel-content" id="req-body">
      <div class="body-type-row">
        <button class="body-type-btn active" id="bt-json" onclick="setBodyType('json')">JSON</button>
        <button class="body-type-btn" id="bt-text" onclick="setBodyType('text')">Text</button>
        <button class="body-type-btn" id="bt-form" onclick="setBodyType('form')">Form</button>
        <button class="body-type-btn" id="bt-none" onclick="setBodyType('none')">None</button>
      </div>
      <div id="bodyContent" style="display:flex;flex-direction:column;gap:8px;">
        <textarea class="body-textarea" id="bodyTextarea" placeholder='{"key": "value"}'></textarea>
      </div>
    </div>
  </div>

  <!-- Splitter -->
  <div class="splitter" id="splitter"></div>

  <!-- Response Panel -->
  <div class="response-panel panel-hidden" id="responsePanel">
    <div class="tab-bar">
      <div class="tab active" onclick="resTab(this,'body')">Body</div>
      <div class="tab" onclick="resTab(this,'resHeaders')">Headers</div>
    </div>
    <div class="panel-content active" id="res-body" style="padding:0;overflow:hidden;">
      <div id="responseEmpty" class="response-empty">
        <div class="response-empty-icon">⚡</div>
        <p>Enter a URL and hit SEND to make your first request.</p>
      </div>
      <div id="responseResult" style="display:none;flex-direction:column;height:100%;">
        <div class="response-meta" id="responseMeta"></div>
        <div class="response-body-wrapper">
          <pre class="response-code" id="responseCode"></pre>
        </div>
      </div>
    </div>
    <div class="panel-content" id="res-resHeaders" style="padding:0;overflow:hidden;">
      <div id="responseHeadersList" class="response-headers-list"></div>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bottom-nav-btn active" id="navReq" onclick="mobilePanel('request')">
      <span class="nav-icon">✏️</span>Request
    </button>
    <button class="bottom-nav-btn" id="navRes" onclick="mobilePanel('response')">
      <span class="nav-icon">📡</span>Response
    </button>
  </div>
</div>

<!-- History Modal -->
<div class="overlay" id="historyOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Request History</span>
      <button class="modal-close" onclick="hideHistory()">✕</button>
    </div>
    <div class="modal-body" id="historyBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg"></span></div>

<script>
// ══════════════════════════════════════════════════════════════
// SERVICE WORKER REGISTRATION
// ══════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[PWA] SW registered, scope:', reg.scope);
        // Check for updates
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              toast('App updated — reload to get latest');
            }
          });
        });
      })
      .catch(err => console.warn('[PWA] SW registration failed:', err));
  });
}

// ══════════════════════════════════════════════════════════════
// INSTALL PROMPT
// ══════════════════════════════════════════════════════════════
let _deferredInstall = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstall = e;
  document.getElementById('installBtn').classList.add('show');
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBtn').classList.remove('show');
  _deferredInstall = null;
  toast('App installed successfully!');
});

async function installApp() {
  if (!_deferredInstall) return;
  _deferredInstall.prompt();
  const { outcome } = await _deferredInstall.userChoice;
  if (outcome === 'accepted') _deferredInstall = null;
}

// ══════════════════════════════════════════════════════════════
// OFFLINE / ONLINE DETECTION
// ══════════════════════════════════════════════════════════════
function updateOnlineStatus() {
  const pill = document.getElementById('offlinePill');
  if (!navigator.onLine) {
    pill.classList.add('show');
  } else {
    pill.classList.remove('show');
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', () => { updateOnlineStatus(); toast('You are offline — app still works!'); });
updateOnlineStatus();

// ══════════════════════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════════════════════
let paramRows = [], headerRows = [], bodyType = 'json', lastResponse = null;
let history = [];
try { history = JSON.parse(localStorage.getItem('apitester_hist') || '[]'); } catch(e){}
let currentPanel = 'request';

// ── Init ──
addRow('param'); addRow('param');
addRow('header'); addRow('header');
applyLayout();
window.addEventListener('resize', applyLayout);

function isMobile() { return window.innerWidth <= 768; }

function applyLayout() {
  if (isMobile()) {
    mobilePanel(currentPanel, true);
  } else {
    document.getElementById('requestPanel').classList.remove('panel-hidden');
    document.getElementById('responsePanel').classList.remove('panel-hidden');
    const rp = document.getElementById('requestPanel');
    if (!rp.style.width) rp.style.width = '50%';
  }
}

// ── Mobile Panel Switch ──
function mobilePanel(which, silent) {
  currentPanel = which;
  const req = document.getElementById('requestPanel');
  const res = document.getElementById('responsePanel');
  const navReq = document.getElementById('navReq');
  const navRes = document.getElementById('navRes');
  if (which === 'request') {
    req.classList.remove('panel-hidden'); res.classList.add('panel-hidden');
    navReq.classList.add('active'); navRes.classList.remove('active');
  } else {
    res.classList.remove('panel-hidden'); req.classList.add('panel-hidden');
    navRes.classList.add('active'); navReq.classList.remove('active');
  }
}

// ── Tabs ──
function reqTab(el, id) {
  el.closest('.tab-bar').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('[id^="req-"]').forEach(p=>p.classList.remove('active'));
  document.getElementById('req-'+id)?.classList.add('active');
}
function resTab(el, id) {
  el.closest('.tab-bar').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('[id^="res-"]').forEach(p=>p.classList.remove('active'));
  document.getElementById('res-'+id)?.classList.add('active');
}

// ── KV Rows ──
function addRow(type) {
  const id = 'r'+Date.now()+Math.floor(Math.random()*1e4);
  (type==='param'?paramRows:headerRows).push({id,key:'',value:''});
  renderRows(type);
}
function renderRows(type) {
  const arr = type==='param'?paramRows:headerRows;
  document.getElementById(type==='param'?'paramRows':'headerRows').innerHTML =
    arr.map(r=>`
      <div class="kv-row" style="margin-bottom:7px;">
        <input class="kv-input" placeholder="${type==='param'?'key':'Header-Name'}"
          value="${esc(r.key)}" oninput="upRow('${type}','${r.id}','key',this.value)"/>
        <input class="kv-input" placeholder="value"
          value="${esc(r.value)}" oninput="upRow('${type}','${r.id}','value',this.value)"/>
        <button class="kv-delete" onclick="delRow('${type}','${r.id}')">×</button>
      </div>`).join('');
}
function upRow(type,id,f,v){ const r=(type==='param'?paramRows:headerRows).find(r=>r.id===id); if(r) r[f]=v; }
function delRow(type,id){ if(type==='param') paramRows=paramRows.filter(r=>r.id!==id); else headerRows=headerRows.filter(r=>r.id!==id); renderRows(type); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── Body Type ──
function setBodyType(type) {
  bodyType=type;
  ['json','text','form','none'].forEach(t=>document.getElementById('bt-'+t).classList.toggle('active',t===type));
  const bc=document.getElementById('bodyContent');
  if(type==='none'){
    bc.innerHTML=`<p style="color:var(--text-muted);font-size:12px;font-family:var(--mono);padding:4px 0;">No body will be sent.</p>`;
  }else if(type==='form'){
    bc.innerHTML=`<div id="formRows"></div><button class="add-row-btn" onclick="addFRow()">+ Add Field</button>`;
    window._fRows=[];addFRow();addFRow();
  }else{
    bc.innerHTML=`<textarea class="body-textarea" id="bodyTextarea"
      placeholder="${type==='json'?'{\n  "key": "value"\n}':'Plain text body...'}"></textarea>`;
  }
}
function addFRow(){if(!window._fRows)window._fRows=[];const id='f'+Date.now()+Math.floor(Math.random()*1e4);window._fRows.push({id,key:'',value:''});renderFRows();}
function renderFRows(){const c=document.getElementById('formRows');if(!c)return;c.innerHTML=(window._fRows||[]).map(r=>`<div class="kv-row" style="margin-bottom:7px;"><input class="kv-input" placeholder="field" value="${esc(r.key)}" oninput="upFRow('${r.id}','key',this.value)"/><input class="kv-input" placeholder="value" value="${esc(r.value)}" oninput="upFRow('${r.id}','value',this.value)"/><button class="kv-delete" onclick="delFRow('${r.id}')">×</button></div>`).join('');}
function upFRow(id,f,v){const r=(window._fRows||[]).find(r=>r.id===id);if(r)r[f]=v;}
function delFRow(id){window._fRows=(window._fRows||[]).filter(r=>r.id!==id);renderFRows();}

// ── Auth ──
function renderAuthFields(){
  const t=document.getElementById('authType').value,f=document.getElementById('authFields');
  const inp=(id,ph,type='text')=>`<input class="kv-input" id="${id}" style="width:100%;margin-top:5px;" placeholder="${ph}" type="${type}"/>`;
  if(t==='none'){f.innerHTML='';}
  else if(t==='bearer'){f.innerHTML=`<div class="field-group"><div class="label">Token</div>${inp('authToken','your-bearer-token')}</div>`;}
  else if(t==='basic'){f.innerHTML=`<div class="field-group"><div class="label">Username</div>${inp('authUser','username')}</div><div class="field-group" style="margin-top:8px;"><div class="label">Password</div>${inp('authPass','password','password')}</div>`;}
  else if(t==='apikey'){f.innerHTML=`<div class="field-group"><div class="label">Header Name</div>${inp('authKeyName','X-API-Key')}</div><div class="field-group" style="margin-top:8px;"><div class="label">Value</div>${inp('authKeyVal','your-api-key')}</div>`;}
}

// ── Build Request ──
function buildRequest(){
  let url=document.getElementById('urlInput').value.trim();
  const method=document.getElementById('methodSelect').value;
  const params=paramRows.filter(r=>r.key.trim());
  if(params.length) url+=(url.includes('?')?'&':'?')+new URLSearchParams(params.map(r=>[r.key,r.value])).toString();
  const headers={};
  headerRows.filter(r=>r.key.trim()).forEach(r=>{headers[r.key]=r.value;});
  const at=document.getElementById('authType').value;
  if(at==='bearer'){const t=document.getElementById('authToken')?.value||'';if(t)headers['Authorization']=`Bearer ${t}`;}
  else if(at==='basic'){const u=document.getElementById('authUser')?.value||'',p=document.getElementById('authPass')?.value||'';headers['Authorization']=`Basic ${btoa(u+':'+p)}`;}
  else if(at==='apikey'){const n=document.getElementById('authKeyName')?.value||'X-API-Key',v=document.getElementById('authKeyVal')?.value||'';if(v)headers[n]=v;}
  let body=undefined;
  if(!['GET','HEAD'].includes(method)){
    if(bodyType==='json'){const r=document.getElementById('bodyTextarea')?.value||'';if(r.trim()){headers['Content-Type']='application/json';body=r;}}
    else if(bodyType==='text'){const r=document.getElementById('bodyTextarea')?.value||'';if(r.trim()){headers['Content-Type']='text/plain';body=r;}}
    else if(bodyType==='form'){const fd=new URLSearchParams();(window._fRows||[]).filter(r=>r.key.trim()).forEach(r=>fd.append(r.key,r.value));headers['Content-Type']='application/x-www-form-urlencoded';body=fd.toString();}
  }
  return{url,method,headers,body};
}

// ── Send ──
async function sendRequest(){
  const rawUrl=document.getElementById('urlInput').value.trim();
  if(!rawUrl){toast('Enter a URL first');return;}
  const btn=document.getElementById('sendBtn'),bar=document.getElementById('loadingBar');
  btn.disabled=true;btn.textContent='...';bar.classList.add('active');
  let req;
  try{req=buildRequest();}catch(e){toast('Error: '+e.message);resetBtn();return;}
  const t0=Date.now();
  let status=0,statusText='',resH={},resBody='',ok=false;
  try{
    const opts={method:req.method,headers:req.headers};
    if(req.body!==undefined)opts.body=req.body;
    const res=await fetch(req.url,opts);
    status=res.status;statusText=res.statusText;ok=res.ok;
    res.headers.forEach((v,k)=>{resH[k]=v;});
    resBody=await res.text();
  }catch(e){statusText='Network Error';resBody=e.message;}
  const elapsed=Date.now()-t0;
  history.unshift({method:req.method,url:rawUrl,status:status||'ERR',elapsed,time:new Date().toLocaleTimeString()});
  if(history.length>50)history.pop();
  try{localStorage.setItem('apitester_hist',JSON.stringify(history));}catch(e){}
  showResponse({status,statusText,headers:resH,body:resBody,elapsed,ok});
  resetBtn();
  if(isMobile())mobilePanel('response');
  document.querySelectorAll('[id^="res-"]').forEach(p=>p.classList.remove('active'));
  document.getElementById('res-body').classList.add('active');
  document.querySelectorAll('#responsePanel .tab-bar .tab').forEach((t,i)=>t.classList.toggle('active',i===0));
}
function resetBtn(){const btn=document.getElementById('sendBtn'),bar=document.getElementById('loadingBar');btn.disabled=false;btn.textContent='SEND';bar.classList.remove('active');}

// ── Show Response ──
function showResponse({status,statusText,headers,body,elapsed}){
  lastResponse={status,statusText,headers,body,elapsed};
  document.getElementById('responseEmpty').style.display='none';
  const res=document.getElementById('responseResult');res.style.display='flex';
  const cat=status?Math.floor(status/100):0;
  const cls=cat===2?'status-2xx':cat===3?'status-3xx':cat===4?'status-4xx':cat===5?'status-5xx':'status-err';
  const sz=new Blob([body]).size,szStr=sz<1024?sz+' B':(sz/1024).toFixed(1)+' KB';
  document.getElementById('responseMeta').innerHTML=`<span class="status-badge ${cls}">${status||'ERR'} ${statusText}</span><span class="meta-item">⏱ <span>${elapsed}ms</span></span><span class="meta-item">📦 <span>${szStr}</span></span><button class="copy-btn" onclick="copyRes()">Copy</button>`;
  const code=document.getElementById('responseCode'),ct=headers['content-type']||'';
  if(ct.includes('json')||(body.trim()[0]==='{'||body.trim()[0]==='[')){try{code.innerHTML=highlight(JSON.stringify(JSON.parse(body),null,2));}catch{code.textContent=body;}}else{code.textContent=body;}
  document.getElementById('responseHeadersList').innerHTML=Object.entries(headers).map(([k,v])=>`<div class="header-row"><span class="header-key">${k}</span><span class="header-val">${v}</span></div>`).join('')||'<p style="padding:20px;color:var(--text-muted);font-size:12px;">No headers returned</p>';
}

function highlight(json){
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,m=>{
      let c='json-number';
      if(/^"/.test(m))c=/:$/.test(m)?'json-key':'json-string';
      else if(/true|false/.test(m))c='json-bool';
      else if(/null/.test(m))c='json-null';
      return`<span class="${c}">${m}</span>`;
    });
}

function copyRes(){
  if(!lastResponse)return;
  const txt=lastResponse.body;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('Copied!'));}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied!');}
}

// ── History ──
function showHistory(){
  document.getElementById('historyBody').innerHTML=history.length
    ?history.map((h,i)=>{const cat=typeof h.status==='number'?Math.floor(h.status/100):0;const cls=cat===2?'hist-2xx':cat===4||cat===5?'hist-4xx':'hist-err';return`<div class="history-item" onclick="loadHist(${i})"><span class="method-tag method-${h.method}">${h.method}</span><span class="history-url">${h.url}</span><span class="history-status ${cls}">${h.status}</span><span style="font-size:10px;color:var(--text-muted);font-family:var(--mono);flex-shrink:0">${h.time}</span></div>`;}).join('')
    :'<div class="empty-history">No requests yet. Send your first one!</div>';
  document.getElementById('historyOverlay').classList.add('show');
}
function hideHistory(){document.getElementById('historyOverlay').classList.remove('show');}
function overlayClick(e){if(e.target===document.getElementById('historyOverlay'))hideHistory();}
function loadHist(i){const h=history[i];document.getElementById('urlInput').value=h.url;document.getElementById('methodSelect').value=h.method;updateMethodColor();hideHistory();toast('Loaded');}

// ── Toast ──
function toast(msg){
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ── Splitter ──
const spl=document.getElementById('splitter'),rp=document.getElementById('requestPanel');
let drag=false,sx,sw;
spl.addEventListener('mousedown',e=>{if(isMobile())return;drag=true;sx=e.clientX;sw=rp.offsetWidth;spl.classList.add('dragging');document.body.style.cursor='col-resize';document.body.style.userSelect='none';});
document.addEventListener('mousemove',e=>{if(!drag)return;const w=Math.max(240,Math.min(sw+e.clientX-sx,window.innerWidth-240));rp.style.width=w+'px';});
document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;spl.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';});

// ── Method Color ──
function updateMethodColor(){const s=document.getElementById('methodSelect');s.className='method-select method-'+s.value;}
document.getElementById('methodSelect').addEventListener('change',updateMethodColor);
updateMethodColor();

// ── Enter to send ──
document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendRequest();});
</script>
</body>
</html>
